<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardian AI - Safety Navigator</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-shell">
        <header>
            <div class="logo">GUARDIAN<span>AI</span></div>
            <div id="status" class="status-pulse">LIVE SENSORS ACTIVE</div>
        </header>

        <div id="map"></div>

        <div class="safety-panel">
            <div class="route-inputs">
                <input type="text" id="start" placeholder="Starting Point (e.g. Pari Chowk)">
                <input type="text" id="end" placeholder="Destination (e.g. Noida Sector 18)">
                <button onclick="calculateSafeRoute()" class="btn-route">SEARCH SAFE ROUTE</button>
            </div>

            <div class="stats">
                <div class="stat-box">AREA RISK: <span id="risk-lvl">LOW</span></div>
                <div class="stat-box">SAFETY SCORE: <span id="score">--</span></div>
            </div>

            <button id="sos-btn" onclick="triggerSOS()">EMERGENCY SOS</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src="app.js"></script>
</body>
</html>
